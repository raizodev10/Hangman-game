<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern JavaScript Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="close"
        style="display: flex; align-items: center; justify-content: center; justify-content: space-evenly; margin-left: 10px; margin-top: 0px; background-color: none; border: 2px solid black; border-radius: 4px;">
        <div class="close" style="position: absolute; ">❤</div>
        <div class="minimiz">🙌</div>
        <div class="maximize">🤦‍♂️</div>
    </div>
    <div class="calculator">
        <input type="text" id="display" readonly value="0">
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">&divide;</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">&times;</button>
            <button class="btn btn-operator" onclick="deleteLast()">&larr;</button>
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">&minus;</button>
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
            <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
